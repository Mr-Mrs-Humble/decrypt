<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Geheime Nachricht 💖</title>
<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Georgia, serif;
    background: radial-gradient(circle at top, #3b0a0a, #120005);
    color: #ffd6e0;
    overflow: hidden;
}
.card {
    width: 420px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(255,0,80,0.3);
    text-align: center;
    z-index: 2;
}
h1 {
    color: #ff9bb3;
    margin-top: 0;
}
.toggle {
    display: flex;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 4px;
    margin-top: 10px;
}
.toggle button {
    flex: 1;
    margin: 0;
    background: transparent;
    box-shadow: none;
    color: #ffd6e0;
    font-weight: normal;
    opacity: 0.7;
}
.toggle button.active {
    background: linear-gradient(45deg, #ff4d6d, #ff99b6);
    color: white;
    font-weight: bold;
    opacity: 1;
}
label {
    display: block;
    text-align: left;
    font-size: 13px;
    margin-top: 12px;
    opacity: 0.8;
}
textarea, input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-family: monospace;
    box-sizing: border-box;
}
textarea {
    height: 100px;
    resize: none;
}
button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #ff4d6d, #ff99b6);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.15s ease;
}
button:hover {
    transform: scale(1.03);
}
#action-btn {
    margin-top: 15px;
}
#output {
    margin-top: 15px;
    min-height: 40px;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    white-space: pre-wrap;
    word-break: break-all;
    text-align: left;
}
.copy-btn {
    margin-top: 8px;
    background: rgba(255,255,255,0.15);
    font-size: 13px;
    padding: 6px;
}
/* 🌸 Flowers */
.flower {
    position: absolute;
    top: -50px;
    animation: fall linear forwards;
    opacity: 0.8;
    z-index: 1;
    pointer-events: none;
}
@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}
</style>
</head>
<body>
<div class="card">
    <h1>💌 Geheime Nachricht</h1>
 
    <div class="toggle">
        <button id="mode-encrypt" class="active" onclick="setMode('encrypt')">🔒 Verschlüsseln</button>
        <button id="mode-decrypt" onclick="setMode('decrypt')">🔓 Entschlüsseln</button>
    </div>
 
    <label id="input-label" for="input-text">Deine Nachricht:</label>
    <textarea id="input-text" placeholder="Text hier eingeben..."></textarea>
 
    <label for="key">Schlüssel:</label>
    <input id="key" placeholder="Schlüssel..." />
 
    <button id="action-btn" onclick="run()">🔒 Verschlüsseln</button>
 
    <div id="output">Ergebnis erscheint hier ✨</div>
    <button class="copy-btn" onclick="copyOutput()">📋 Kopieren</button>
</div>
<script>
let mode = "encrypt"; // "encrypt" | "decrypt"
 
// 🌸 Animation (safe)
function createFlower() {
    const flower = document.createElement("div");
    flower.className = "flower";
    const list = ["🌸","🌺","🌷","💮","🌼","💖"];
    flower.innerText = list[Math.floor(Math.random()*list.length)];
    flower.style.left = Math.random() * window.innerWidth + "px";
    flower.style.fontSize = (18 + Math.random()*20) + "px";
    flower.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(flower);
    setTimeout(() => flower.remove(), 10000);
}
setInterval(createFlower, 500);
 
// 🔐 XOR core (byte-weise, symmetrisch)
function xorBytes(bytes, key) {
    const keyBytes = new TextEncoder().encode(key);
    const result = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) {
        result[i] = bytes[i] ^ keyBytes[i % keyBytes.length];
    }
    return result;
}
 
// 🔒 Text -> verschlüsselter Base64-String
function xorEncrypt(text, key) {
    const bytes = new TextEncoder().encode(text);
    const encrypted = xorBytes(bytes, key);
    let binary = "";
    encrypted.forEach(b => binary += String.fromCharCode(b));
    return btoa(binary);
}
 
// 🔓 Base64-String -> ursprünglicher Text
function xorDecrypt(base64, key) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    const decrypted = xorBytes(bytes, key);
    return new TextDecoder().decode(decrypted);
}
 
// 🔄 Modus wechseln
function setMode(newMode) {
    mode = newMode;
    document.getElementById("mode-encrypt").classList.toggle("active", mode === "encrypt");
    document.getElementById("mode-decrypt").classList.toggle("active", mode === "decrypt");
 
    const label = document.getElementById("input-label");
    const input = document.getElementById("input-text");
    const btn = document.getElementById("action-btn");
 
    if (mode === "encrypt") {
        label.textContent = "Deine Nachricht:";
        input.placeholder = "Text hier eingeben...";
        btn.textContent = "🔒 Verschlüsseln";
    } else {
        label.textContent = "Verschlüsselte Nachricht (Base64):";
        input.placeholder = "Base64 Nachricht hier...";
        btn.textContent = "🔓 Entschlüsseln";
    }
    document.getElementById("output").textContent = "Ergebnis erscheint hier ✨";
}
 
// 💌 Hauptfunktion
function run() {
    const text = document.getElementById("input-text").value.trim();
    const key = document.getElementById("key").value;
    const output = document.getElementById("output");
 
    if (!text || !key) {
        output.textContent = "Bitte Nachricht und Schlüssel eingeben ❤️";
        return;
    }
 
    try {
        if (mode === "encrypt") {
            output.textContent = xorEncrypt(text, key);
        } else {
            output.textContent = xorDecrypt(text, key);
        }
    } catch (e) {
        output.textContent = "❌ Fehler: falsche Nachricht oder Schlüssel";
    }
}
 
function copyOutput() {
    const output = document.getElementById("output");
    navigator.clipboard.writeText(output.textContent).then(() => {
        const original = output.textContent;
        output.textContent = "✅ Kopiert!";
        setTimeout(() => output.textContent = original, 800);
    });
}
</script>
</body>
</html>
